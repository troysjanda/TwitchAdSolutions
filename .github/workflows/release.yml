name: Create Release

on:
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install acorn
      run: npm install -g acorn

    - name: Validate userscripts
      run: |
        for f in vaft/vaft.user.js vaft/vaft_testing.user.js video-swap-new/video-swap-new.user.js strip/strip.user.js; do
          echo "Validating $f..."
          acorn --ecma2022 "$f" > /dev/null
        done

    - name: Validate uBlock scripts
      run: |
        for f in vaft/vaft-ublock-origin.js vaft/vaft-testing-ublock-origin.js video-swap-new/video-swap-new-ublock-origin.js; do
          echo "Validating $f..."
          tail -n +2 "$f" | acorn --ecma2022 > /dev/null
        done

    - name: Set up Git user
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ github.run_number }}"
        name: "Release v${{ github.run_number }}"
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
